name: Release Build & Publish

on:
  push:
    tags:
      - 'v*' # Triggers on release tags like v0.2.0, v1.0.0

permissions:
  contents: write # Required to create/edit releases and upload assets

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install System Dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install Monorepo Dependencies
        run: npm ci

      - name: Build Monorepo Dependencies
        run: |
          npm run build -w packages/shared-types
          npm run build -w apps/backend-api
          npm run build -w apps/host-agent

      - name: Package Host Agent Sidecars (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          mkdir -p apps/desktop-ui/src-tauri/bin
          npm run pkg:macos -w apps/host-agent
          cp apps/host-agent/bin/host-agent-aarch64-apple-darwin apps/desktop-ui/src-tauri/bin/host-agent-aarch64-apple-darwin
          cp apps/host-agent/bin/host-agent-x86_64-apple-darwin apps/desktop-ui/src-tauri/bin/host-agent-x86_64-apple-darwin
          chmod +x apps/desktop-ui/src-tauri/bin/host-agent-aarch64-apple-darwin
          chmod +x apps/desktop-ui/src-tauri/bin/host-agent-x86_64-apple-darwin

      - name: Package Host Agent Sidecars (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          mkdir -p apps/desktop-ui/src-tauri/bin
          npm run pkg -w apps/host-agent
          cp apps/host-agent/bin/host-agent-x86_64-pc-windows-msvc.exe apps/desktop-ui/src-tauri/bin/host-agent-x86_64-pc-windows-msvc.exe

      - name: Build & Publish Tauri Desktop App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'v${{ github.ref_name }}'
          releaseBody: 'Release v${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          projectPath: 'apps/desktop-ui'
